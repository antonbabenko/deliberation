name: Tag and Publish Release

# Part B of the PR-based release flow (see automated-release.yml).
# Runs after the `chore(release): vX.Y.Z` PR squash-merges to master. It tags the
# merged master commit and publishes the GitHub Release. It never commits, so it
# cannot start a release loop.

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write # OIDC: npm trusted publishing (provenance) + MCP registry login

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag-release:
    name: Tag and publish
    runs-on: ubuntu-latest
    # Only act on the merged release commit.
    if: ${{ startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve version and tag
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.version' version.json)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::version.json has no version"; exit 1
          fi
          TAG="v${VERSION}"
          # Guard: commit subject must reference this version (catches a desync
          # between version.json and the release commit).
          SUBJECT="$(git log -1 --pretty=%s)"
          case "$SUBJECT" in
            *"$TAG"*) : ;;
            *) echo "::error::release commit subject '$SUBJECT' does not match $TAG"; exit 1 ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag (idempotent)
        id: tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            EXISTING="$(git rev-list -n1 "${TAG}")"
            if [ "$EXISTING" != "$GITHUB_SHA" ]; then
              echo "::error::tag ${TAG} already exists at ${EXISTING}, not ${GITHUB_SHA}"; exit 1
            fi
            echo "Tag ${TAG} already at ${GITHUB_SHA}; skipping create."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # First version block in CHANGELOG.md (angular preset headings start
          # with '#' then a bracketed/plain version). Empty file is fine.
          awk '
            /^#+[[:space:]]+\[?[0-9]+\./ { if (seen++) exit }
            seen { print }
          ' CHANGELOG.md > /tmp/notes.md || true
          if [ ! -s /tmp/notes.md ]; then echo "Release ${VERSION}" > /tmp/notes.md; fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: /tmp/notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # Publish the npm package via OIDC trusted publishing (no stored token).
      # Gated on a freshly-created tag so a re-run never double-publishes a version.
      # Requires a one-time "trusted publisher" config on npmjs.com for
      # @antonbabenko/deliberation-mcp linked to this repo + workflow.
      - name: Set up Node for publish
        if: steps.tag.outputs.created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm (OIDC trusted publishing + provenance)
        if: steps.tag.outputs.created == 'true'
        run: |
          set -euo pipefail
          npm ci
          npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5
          npm publish -w server/mcp --provenance --access public

      # Submit the version-synced server.json to the Official MCP Registry via
      # GitHub OIDC (namespace io.github.antonbabenko/* is owned by this repo's
      # identity). Best-effort: a registry hiccup must not red an already-published
      # npm release - it can be re-published manually with mcp-publisher.
      - name: Publish to the MCP Registry
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -uo pipefail
          gh release download --repo modelcontextprotocol/registry \
            --pattern 'mcp-publisher_linux_amd64.tar.gz' --output mcp-publisher.tar.gz || {
              echo "::warning::could not download mcp-publisher; skipping registry publish"; exit 0; }
          tar xzf mcp-publisher.tar.gz mcp-publisher || {
              echo "::warning::could not extract mcp-publisher; skipping"; exit 0; }
          chmod +x mcp-publisher
          ./mcp-publisher login github-oidc && ./mcp-publisher publish \
            || echo "::warning::MCP registry publish failed; re-run mcp-publisher manually"

      # On a real release, nudge the agent-plugins marketplace to re-pin this
      # plugin now instead of waiting for its daily cron. Needs a PAT with
      # Actions: read+write on agent-plugins (the per-repo GITHUB_TOKEN cannot
      # trigger another repo's workflow). No-ops if the secret is absent.
      - name: Trigger agent-plugins external-plugin update
        env:
          GH_TOKEN: ${{ secrets.AGENT_PLUGINS_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "AGENT_PLUGINS_DISPATCH_TOKEN not set; skipping cross-repo trigger."
            exit 0
          fi
          gh workflow run update-external-plugins.yml -R antonbabenko/agent-plugins
