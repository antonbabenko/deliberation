name: Validate

# Required status check for the PR-based release flow. The `master` ruleset
# requires the "validate" check, which is why automated-release.yml routes the
# version bump through a PR (a direct push would bypass this gate). Keep the job
# name "validate" in sync with the branch ruleset's required-check name.

on:
  pull_request:
  workflow_dispatch:

# All changes land on master via PR squash-merge, and master's ruleset requires
# this "validate" check - so the pull_request run already gates every merge. A
# post-merge push:[master] run would only re-test the identical tree, so it is
# omitted. workflow_dispatch stays as a manual fallback.
concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run bridge tests
        run: node --test test/*.test.js

      - name: Check generated artifacts in sync
        run: npm run sync:check

      - name: Check version sync
        run: |
          node << 'EOF'
          const fs = require('fs')
          const SEMVER = /^\d+\.\d+\.\d+$/

          function readJSON(p) {
            try {
              return JSON.parse(fs.readFileSync(p, 'utf8'))
            } catch (e) {
              console.error(`ERROR ${p}: ${e.message}`)
              process.exit(1)
            }
          }

          // version.json is the CI-owned source of truth.
          const source = readJSON('version.json').version
          if (!(typeof source === 'string' && SEMVER.test(source))) {
            console.error(`ERROR version.json version is not valid semver: ${JSON.stringify(source)}`)
            process.exit(1)
          }

          const checks = [
            ['.claude-plugin/plugin.json', readJSON('.claude-plugin/plugin.json').version],
            ['.claude-plugin/marketplace.json', (readJSON('.claude-plugin/marketplace.json').plugins || [])[0]?.version],
            ['package.json', readJSON('package.json').version],
            ['plugins/deliberation/.codex-plugin/plugin.json', readJSON('plugins/deliberation/.codex-plugin/plugin.json').version],
            ['server/mcp/package.json', readJSON('server/mcp/package.json').version],
            ['server.json', readJSON('server.json').version],
            ['server.json packages[0]', (readJSON('server.json').packages || [])[0]?.version],
          ]

          let bad = false
          for (const [label, value] of checks) {
            // Require valid semver AND equality. Equality alone would pass when
            // both are missing/empty.
            if (!(typeof value === 'string' && SEMVER.test(value))) {
              console.error(`ERROR ${label} version not valid semver: ${JSON.stringify(value)}`)
              bad = true
              continue
            }
            if (value !== source) {
              console.error(`ERROR ${label}=${value} != version.json=${source}. CI owns these; do not hand-edit (see CLAUDE.md).`)
              bad = true
            } else {
              console.log(`OK ${label} in sync (${value})`)
            }
          }
          if (bad) process.exit(1)
          console.log(`OK all version files in sync (${source})`)
          EOF

      - name: Summary
        if: success()
        run: |
          echo "## Validation passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Bridge tests green and all version files in sync." >> "$GITHUB_STEP_SUMMARY"
